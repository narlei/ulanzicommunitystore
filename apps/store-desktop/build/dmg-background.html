<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 660px;
    height: 420px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, #f3f3f5 0%, #e9e9ec 100%);
    -webkit-font-smoothing: antialiased;
  }

  .banner {
    position: absolute;
    top: 26px;
    left: 40px;
    right: 40px;
    height: 84px;
    background: #fff4dd;
    border: 1px solid #f0c675;
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    box-sizing: border-box;
  }

  .banner .icon {
    font-size: 30px;
    margin-right: 14px;
  }

  .banner .text .title {
    font-size: 14px;
    font-weight: 600;
    color: #6b4a12;
    line-height: 1.35;
  }

  .banner .text .subtitle {
    font-size: 11.5px;
    color: #8a6a2c;
    margin-top: 3px;
    line-height: 1.35;
  }

  .stage {
    position: absolute;
    top: 190px;
    left: 0;
    width: 660px;
    height: 140px;
  }

  .arrow {
    position: absolute;
    top: 66px;
    left: 235px;
    width: 190px;
    height: 0;
    border-top: 3px dashed #b9b9bd;
  }

  .arrow::after {
    content: "";
    position: absolute;
    right: -2px;
    top: -8px;
    width: 0;
    height: 0;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    border-left: 14px solid #b9b9bd;
  }

  .footer {
    position: absolute;
    bottom: 22px;
    left: 0;
    width: 660px;
    text-align: center;
    font-size: 10.5px;
    color: #9a9a9e;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="icon">⚠️</div>
    <div class="text">
      <div class="title">Não dê duplo clique — clique com o botão direito no app e escolha "Abrir"</div>
      <div class="subtitle">Necessário apenas na primeira vez, pois o app ainda não é assinado pela Apple.</div>
    </div>
  </div>

  <div class="stage">
    <div class="arrow"></div>
  </div>

  <div class="footer">Ulanzi Plugin Store</div>
</body>
</html>
