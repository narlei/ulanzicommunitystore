<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ulanzi Plugin Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <span class="brand">
        <span class="brand-mark">◈</span>
        <span class="brand-name">Ulanzi Plugin Store</span>
      </span>
      <nav class="header-nav">
        <a href="https://ulanzipluginstore.narlei.com/publish.php" target="_blank" rel="noopener" data-i18n="nav.publish">Publish</a>
        <span class="lang-switch" id="lang-switch"></span>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1 id="hero-title"></h1>
      <p class="hero-sub" id="hero-sub"></p>
    </section>

    <section class="toolbar" id="toolbar" hidden>
      <div class="search">
        <input type="search" id="search" autocomplete="off" spellcheck="false">
      </div>
      <div class="filter-group" id="device-filter" data-group="device" role="group"></div>
    </section>

    <div class="loading" id="loading" data-i18n="loading">Loading…</div>
    <div class="load-error" id="load-error" hidden></div>
    <section class="grid" id="grid" hidden></section>
    <p class="empty" id="no-results" hidden></p>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p class="disclaimer" id="disclaimer"></p>
    </div>
  </footer>

  <div id="detail-modal" class="modal" hidden>
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-card detail-modal" role="dialog" aria-modal="true">
      <button type="button" class="modal-x" data-modal-close aria-label="×">&times;</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <script src="i18n-data.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
