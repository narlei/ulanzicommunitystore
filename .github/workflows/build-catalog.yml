name: build-catalog

# Regenera public_html/catalog.json a partir do registry e commita na main.
# A Hostinger publica sozinha ao detectar o push (integração GitHub → public_html).

on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - 'scripts/build-catalog.mjs'
      - '.github/workflows/build-catalog.yml'
  schedule:
    - cron: '0 */6 * * *'   # a cada 6h, pega releases novas dos repos listados
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-catalog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar catálogo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-catalog.mjs

      - name: Commitar se mudou
        run: |
          if git diff --quiet -- public_html/catalog.json; then
            echo "Catálogo sem mudanças."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public_html/catalog.json
          git commit -m "chore: atualiza catálogo [skip ci]"
          git push
