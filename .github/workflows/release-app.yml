name: release-app

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'
      - '.github/workflows/release-app.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: v${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Invalid VERSION: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stop if release already exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release tag already exists."
            exit 1
          fi

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: npm run dist:mac -w @ulanzideck/store-desktop -- --publish never
            files: |
              apps/store-desktop/release/*.dmg
              apps/store-desktop/release/*.zip
          - os: windows-latest
            command: npm run dist:win -w @ulanzideck/store-desktop -- --publish never
            files: |
              apps/store-desktop/release/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - run: npm install

      - run: npm run sync:version

      - run: npm run typecheck

      - run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v7
        with:
          name: app-${{ matrix.os }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Create tag
        run: |
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body_path: release_notes.md
          files: release-assets/*
          draft: false
          prerelease: false
