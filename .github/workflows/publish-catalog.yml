name: publish-catalog

on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - 'packages/catalog/**'
      - '.github/workflows/publish-catalog.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [rebuild-catalog]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm install

      - name: Build catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run catalog:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/catalog

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
